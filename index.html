<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#C8102E" />
    <!-- %BASE_URL%: Vite lo sustituye por la base (/Sumigo/ en prod). Con href
         relativo, en rutas profundas (/Sumigo/detail/X) el navegador resolvía
         /Sumigo/detail/icon-src.svg → 404 y el favicon desaparecía. -->
    <link rel="icon" type="image/svg+xml" href="%BASE_URL%icon-src.svg" />
    <link rel="apple-touch-icon" href="%BASE_URL%icons/apple-touch-icon.png" />
    <title>Sumigo · 墨語</title>
    <script>
      // Aplica el tema (.va claro / .vb oscuro) en <html> ANTES de pintar, para
      // evitar el flash de tema en carga en frío (un usuario "oscuro" veía un
      // destello claro). ThemeProvider lo reaplica luego (idempotente).
      ;(function () {
        try {
          var p = localStorage.getItem('japoweb.theme')
          var dark =
            p === 'dark' ||
            ((p === null || p === 'auto') &&
              window.matchMedia('(prefers-color-scheme: dark)').matches)
          document.documentElement.classList.add(dark ? 'vb' : 'va')
        } catch (e) {}
      })()
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Noto+Serif+JP:wght@400;700;900&family=Shippori+Mincho:wght@400;700&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
